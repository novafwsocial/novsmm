# ─────────────────────────────────────────────────────────────────────────────
# NOVSMM — Docker Compose (Production)
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   web          — Next.js app (port 3000)
#   worker       — BullMQ background job processor
#   notifications — Socket.IO real-time push (port 3003)
#   postgres     — PostgreSQL 16 database
#   redis        — Redis 7 (cache + rate limit + queues)
#   nginx        — Reverse proxy with TLS (ports 80 + 443)
#
# USAGE:
#   1. Copy .env.example to .env and fill in real values
#   2. docker compose up -d
#   3. docker compose exec -T web npx prisma migrate deploy
#   4. docker compose exec web npx tsx prisma/seed.ts
#
# SCALING:
#   - web: docker compose up -d --scale web=3
#   - worker: docker compose up -d --scale worker=2
#   - notifications: single instance (Socket.IO with Redis adapter)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL Database (CIS-hardened) ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    init: true
    # CIS Docker 5.3: Drop ALL capabilities, no new privileges
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    # CIS: Resource limits (prevent OOM cascades)
    mem_limit: 512m
    cpus: 1.0
    # CIS: Read-only root filesystem (writes go to volumes)
    # FIX (L-013): removed `read_only: false` — it's the default and the
    # comment was misleading (sounded like we were disabling something).
    # PostgreSQL needs write access to its data dir, which is the default.
    tmpfs:
      - /tmp:size=64m
      - /run:size=16m
      - /var/run/postgresql:size=16m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novsmm}
      POSTGRES_USER: ${POSTGRES_USER:-novsmm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # CIS PostgreSQL: Disable dangerous defaults
      POSTGRES_INITDB_ARGS: "--auth-local=scram-sha-256 --auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # Mount for backup scripts
    # No ports exposed — services communicate via Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novsmm} -d ${POSTGRES_DB:-novsmm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novsmm-network

  # ── Redis (CIS-hardened) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    init: true
    # CIS Docker 5.3: Drop ALL capabilities, no new privileges
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    # CIS: Resource limits
    mem_limit: 300m
    cpus: 0.5
    # CIS: Read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:size=32m
    # CIS Redis: Disable dangerous commands, require auth, rename commands
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
      --rename-command SHUTDOWN ""
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novsmm-network

  # ── Next.js Web App (CIS-hardened) ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    # CIS Docker 5.3: Drop ALL capabilities (app doesn't need any)
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    # CIS: Resource limits (web is the heaviest service)
    mem_limit: 1g
    cpus: 2.0
    # CIS: Read-only root filesystem (writes go to volumes + tmpfs)
    read_only: true
    tmpfs:
      - /tmp:size=128m
      - /app/.next/cache:size=128m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-novsmm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-novsmm}?connection_limit=10&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WS_SERVICE_URL: http://notifications:3003/broadcast
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/storage/uploads
    ports:
      - "127.0.0.1:3000:3000"  # Only accessible via nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - novsmm-network

  # ── BullMQ Worker (CIS-hardened) ──
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "node_modules/.bin/tsx", "src/workers/worker.ts"]
    # CIS Docker 5.3: Drop ALL capabilities
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    # CIS: Resource limits (worker is lighter than web)
    mem_limit: 512m
    cpus: 1.0
    read_only: true
    tmpfs:
      - /tmp:size=64m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-novsmm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-novsmm}?connection_limit=10&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/storage/uploads
    healthcheck:
      # FIX (M-008): was `node -e "process.exit(0)"` — always exits 0, so
      # the healthcheck was a no-op. Now checks if the worker process is
      # actually running by looking for the tsx process in the process list.
      test: ["CMD-SHELL", "pgrep -f 'worker.ts' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    networks:
      - novsmm-network

  # ── Notifications Service (Socket.IO) ──
  notifications:
    build:
      context: ./mini-services/notifications-service
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NOTIFICATIONS_SERVICE_PORT: "3003"
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3003:3003"  # Only accessible via nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - novsmm-network

  # ── Nginx Reverse Proxy (TLS termination) ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro  # SSL certificates
      - nginx_logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
      notifications:
        condition: service_healthy
    networks:
      - novsmm-network

# ── Volumes ──
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local

# ── Networks ──
networks:
  novsmm-network:
    driver: bridge
