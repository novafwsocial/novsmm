# ═══════════════════════════════════════════════════════════════════════════
# AlertManager Configuration
# ═══════════════════════════════════════════════════════════════════════════
# Configura el webhook de Slack/Discord para recibir alertas.
#
# IMPORTANTE: AlertManager no soporta sustitución de variables de entorno
# nativamente. Se debe usar el flag --config.expand-env al iniciar
# AlertManager, o reemplazar manualmente el valor de SLACK_WEBHOOK_URL.
#
# SLACK:
#   1. Crea un webhook en https://api.slack.com/messaging/webhooks
#   2. Setea la variable de entorno SLACK_WEBHOOK_URL en .env
#   3. El script monitor-setup.sh reemplaza el placeholder antes de iniciar
#
# DISCORD:
#   1. Server Settings → Integrations → Webhooks → New Webhook
#   2. Mismo flujo que Slack (Discord acepta Slack webhooks)
# ═══════════════════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m

route:
  receiver: "slack"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: "slack-critical"
      group_wait: 10s
      repeat_interval: 30m

receivers:
  # Alertas no críticas
  - name: "slack"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#novsmm-alerts"
        send_resolved: true
        title: "⚠️ {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"

  # Alertas críticas (más frecuentes)
  - name: "slack-critical"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#novsmm-alerts"
        send_resolved: true
        title: "🚨 CRITICAL: {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"
