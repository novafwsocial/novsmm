# ═══════════════════════════════════════════════════════════════════════════
# NOVSMM — Docker Compose Monitoring (Prometheus + Grafana + AlertManager)
# ═══════════════════════════════════════════════════════════════════════════
# Levanta Prometheus + Grafana + AlertManager para monitorear NOVSMM.
#
# USO:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# ACCESO:
#   Grafana:    http://localhost:3001 (admin / admin — ¡cambiar!)
#   Prometheus: http://localhost:9090
#   AlertManager: http://localhost:9093
# ═══════════════════════════════════════════════════════════════════════════

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: novsmm-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - novsmm-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: novsmm-alertmanager
    restart: unless-stopped
    init: true
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--config.expand-env'
    environment:
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:?Set SLACK_WEBHOOK_URL in .env}"
      # Email escalation/fallback (P1-067/068) — optional, no-op if SMTP_HOST empty
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-alerts@novsmm.com}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO:-oncall@novsmm.com}"
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - novsmm-network

  grafana:
    image: grafana/grafana:11.3.0
    container_name: novsmm-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:?Set GRAFANA_USER in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env — must not be 'admin'}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - novsmm-network

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: novsmm-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - novsmm-network

  # ── PostgreSQL Exporter ──
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: novsmm-postgres-exporter
    restart: unless-stopped
    init: true
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-novsmm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-novsmm}?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      - postgres
    networks:
      - novsmm-network

  # ── Redis Exporter ──
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: novsmm-redis-exporter
    restart: unless-stopped
    init: true
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    ports:
      - "127.0.0.1:9121:9121"
    depends_on:
      - redis
    networks:
      - novsmm-network

  # ── Blackbox Exporter (P1-063: SSL cert expiry probes) ──
  # Probes the public HTTPS endpoint to check availability + SSL cert expiry.
  # The SslCertExpiringSoon / SslCertExpired alerts (alerts.yml) use the
  # probe_ssl_earliest_cert_expiry metric emitted by this exporter.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: novsmm-blackbox-exporter
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    configs:
      - source: blackbox_config
        target: /etc/blackbox_exporter/config.yml
    ports:
      - "127.0.0.1:9115:9115"
    networks:
      - novsmm-network

configs:
  blackbox_config:
    content: |
      modules:
        http_2xx:
          prober: http
          timeout: 10s
          http:
            valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
            valid_status_codes: [200, 301, 302, 401, 403]
            method: GET
            preferred_ip_protocol: ip4
            ip_protocol_fallback: false
        http_ssl:
          prober: http
          timeout: 10s
          http:
            fail_if_ssl: false
            preferred_ip_protocol: ip4

volumes:
  prometheus_data:
  grafana_data:

networks:
  novsmm-network:
    external: true
