# ─────────────────────────────────────────────────────────────────────────────
# NOVSMM — CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push to main + every PR to main.
# Stages: lint → typecheck → build → security scan → deploy (main only)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # for CodeQL

jobs:
  # ── Stage 1: Lint + Type Check ──
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (non-blocking)
        run: npx eslint src/ --max-warnings=0 || true

  # ── Stage 2: Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-dummy-secret-32-chars-minimum' }}
          NEXTAUTH_URL: https://novsmm.shop
          LICENSE_ENCRYPTION_KEY: ${{ secrets.LICENSE_ENCRYPTION_KEY || 'ci-dummy-license-key-32-chars' }}

  # ── Stage 3: Security Scan ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/r2c-security-audit
            p/typescript

  # ── Stage 4: Deploy (main branch only) ──
  deploy:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy notification
        run: |
          echo "✅ Build passed"
          echo "✅ Security scan passed"
          echo "🚀 Ready for manual deploy:"
          echo "   ssh into server → cd ~/novsmm → git pull → npm run build → pm2 restart novsmm"
