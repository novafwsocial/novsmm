# ─────────────────────────────────────────────────────────────────────────────
# NOVSMM — CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push to main + every PR to main.
# Stages: lint → typecheck → build → security scan → deploy (main only)
#
# FIX (C-004): this pipeline now uses bun (the project's actual package
# manager — bun.lock is committed, package-lock.json is not). Previously
# it used `npm install --legacy-peer-deps` which (a) generated a
# package-lock.json that doesn't match bun.lock, causing drift, and
# (b) failed the "cache: npm" step because there was no lock file to cache.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # for CodeQL

jobs:
  # ── Stage 1: Lint + Type Check ──
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        # FIX (M-011): was non-blocking (`|| true`). Now blocking — lint
        # errors fail the CI build. Use `# eslint-disable-next-line` for
        # intentional exceptions.
        run: bunx eslint src/ --max-warnings=0

  # ── Stage 2: Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build Next.js
        run: bun run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-dummy-secret-32-chars-minimum' }}
          NEXTAUTH_URL: https://novsmm.shop
          LICENSE_ENCRYPTION_KEY: ${{ secrets.LICENSE_ENCRYPTION_KEY || 'ci-dummy-license-key-32-chars' }}

  # ── Stage 3: Security Scan ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Run bun audit
        # FIX (M-011): was non-blocking (`|| true`). Now blocking — high
        # severity vulnerabilities fail the CI build.
        run: bun audit --severity high

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/r2c-security-audit
            p/typescript

  # ── Stage 4: Deploy (main branch only) ──
  deploy:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy notification
        run: |
          echo "✅ Build passed"
          echo "✅ Security scan passed"
          echo "🚀 Ready for manual deploy:"
          echo "   WSL2:    ./scripts/deploy-wsl2.sh"
          echo "   VPS:     ./scripts/deploy.sh (Docker) or ./scripts/deploy-lowmem.sh"
