# ─────────────────────────────────────────────────────────────────────────────
# NOVSMM — Nginx Reverse Proxy Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Features:
#   - TLS termination (Let's Encrypt certificates)
#   - HTTP → HTTPS redirect
#   - Reverse proxy to Next.js (port 3000)
#   - WebSocket upgrade for /socket.io/
#   - Gzip compression
#   - Security headers (in addition to Next.js middleware)
#   - Rate limiting at gateway level
#   - Access logs
#   - Static file caching
#
# PREREQUISITES:
#   - SSL certificates in ./certs/ (fullchain.pem + privkey.pem)
#   - Get free certificates from Let's Encrypt:
#     sudo certbot certonly --standalone -d novsmm.com -d www.novsmm.com
#     sudo cp /etc/letsencrypt/live/novsmm.com/fullchain.pem ./certs/
#     sudo cp /etc/letsencrypt/live/novsmm.com/privkey.pem ./certs/
# ─────────────────────────────────────────────────────────────────────────────

# ── Worker configuration ──
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # ── Cloudflare Real IP ──
    # Required for rate limiting to work behind Cloudflare.
    # Without this, $remote_addr is always a Cloudflare egress IP.
    # Cloudflare IP ranges: https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ── Basic ──
    server_tokens off;  # Don't expose nginx version
    client_max_body_size 50M;  # Max upload size (ticket attachments)
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ── MIME types ──
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-javascript
        application/x-font-ttf
        application/vnd.ms-fontobject
        image/svg+xml
        font/woff2
        multipart/mixed;

    # ── Rate limiting zones ──
    # General API: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Auth endpoints: 1 req/s per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;
    # Payment endpoints: 2 req/s per IP
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=2r/s;

    # ── Upstream: Next.js app ──
    upstream nextjs {
        server web:3000;
        keepalive 32;
    }

    # ── Upstream: Notifications service (Socket.IO) ──
    upstream notifications {
        server notifications:3003;
        keepalive 8;
    }

    # ── HTTP server (works without SSL — use for initial deploy) ──
    # When SSL certs are ready, uncomment the HTTPS server block below
    # and the HTTP→HTTPS redirect.
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── Main app proxy ──
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── WebSocket proxy (notifications) ──
        location /socket.io/ {
            proxy_pass http://notifications;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

