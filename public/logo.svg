<?xml version="1.0" encoding="utf-8"?>
<!-- NOVSMM Logo — redesigned with brand color #0052FF (U-H-001 fix)
     Previous: dark gray (#2D2D2D) badge with white N — no brand color.
     New: electric blue (#0052FF) badge with white N — instant brand
     recognition. The "N" lettermark shape is preserved (same paths),
     only the background color changed. The subtle breathe animation
     is kept for the lettermark. -->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" xml:space="preserve">
  <defs>
    <style type="text/css">
      .badge{fill:#0052FF;stroke:#FFFFFF;stroke-width:0.6317;stroke-miterlimit:10;}
      .letter{fill:#FFFFFF;}
      .z-breathe{animation:breathe 2.5s ease-in-out infinite;}
      @keyframes breathe{0%,100%{opacity:0.7;}50%{opacity:1;}}
      @media (prefers-reduced-motion:reduce){.z-breathe{animation:none!important;opacity:1!important;}}
    </style>
  </defs>
  <g>
    <!-- Badge: electric blue #0052FF (was #2D2D2D) -->
    <path class="badge" d="M24.51,28.51H5.49c-2.21,0-4-1.79-4-4V5.49c0-2.21,1.79-4,4-4h19.03c2.21,0,4,1.79,4,4v19.03
      C28.51,26.72,26.72,28.51,24.51,28.51z"/>
    <!-- N lettermark (white, preserved from original) -->
    <g class="z-breathe">
      <path class="letter" d="M15.47,7.1l-1.3,1.85c-0.2,0.29-0.54,0.47-0.9,0.47h-7.1V7.09C6.16,7.1,15.47,7.1,15.47,7.1z"/>
      <polygon class="letter" points="24.3,7.1 13.14,22.91 5.7,22.91 16.86,7.1"/>
      <path class="letter" d="M14.53,22.91l1.31-1.86c0.2-0.29,0.54-0.47,0.9-0.47h7.09v2.33H14.53z"/>
    </g>
  </g>
</svg>
